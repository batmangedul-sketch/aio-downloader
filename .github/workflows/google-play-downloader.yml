name: google-play-downloader

on:
  workflow_dispatch:
    inputs:
      app:
        description: >-
          Google Play URL or Android package name.
          Examples:
            URL:  https://play.google.com/store/apps/details?id=org.telegram.messenger&hl=en
            Package name:  com.google.android.youtube
        required: true
        type: string
      architecture:
        description: Target device architecture
        required: true
        type: choice
        default: 'arm64'
        options:
          - arm64
          - armv7
      merge_splits:
        description: Bundle all split APKs into one installable APK
        required: false
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  actions:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Determine package name
        id: pkg
        run: |
          INPUT="${{ inputs.app }}"
          if echo "$INPUT" | grep -qE '^https?://'; then
            PACKAGE=$(echo "$INPUT" | grep -oP '(?<=id=)[^&]*')
            if [ -z "$PACKAGE" ]; then
              echo "Error: Could not extract package name from URL"
              exit 1
            fi
            echo "Extracted: $PACKAGE"
          else
            PACKAGE="$INPUT"
            echo "Using raw: $PACKAGE"
          fi
          echo "package=$PACKAGE" >> $GITHUB_OUTPUT

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y -qq openjdk-17-jre-headless apksigner python3 python3-venv python3-pip curl git zip

      - name: Clone gplay-apk-downloader
        run: |
          git clone https://github.com/alltechdev/gplay-apk-downloader.git
          cd gplay-apk-downloader
          ./setup.sh

      - name: Authenticate with Google Play
        run: |
          cd gplay-apk-downloader
          echo "y" | ./gplay auth
          echo "Authentication completed."

      - name: Download APK(s)
        id: download
        run: |
          cd gplay-apk-downloader
          ARCH="${{ inputs.architecture }}"
          MERGE="${{ inputs.merge_splits }}"
          DOWNLOAD_DIR="$RUNNER_TEMP/apk_downloads"
          mkdir -p "$DOWNLOAD_DIR"

          CMD="./gplay download ${{ steps.pkg.outputs.package }} -a $ARCH -o $DOWNLOAD_DIR"
          if [ "$MERGE" = "true" ]; then
            CMD="$CMD -m"
          fi

          echo "Running: $CMD"
          $CMD

          if [ -z "$(ls -A "$DOWNLOAD_DIR" 2>/dev/null)" ]; then
            echo "Error: No files downloaded"
            exit 1
          fi

          echo "download_dir=$DOWNLOAD_DIR" >> $GITHUB_OUTPUT

      - name: Archive each downloaded file (split ZIP)
        run: |
          DOWNLOAD_DIR="${{ steps.download.outputs.download_dir }}"
          UPLOAD_DIR="${{ github.workspace }}/google-play"   # ← Absolute, robust path
          mkdir -p "$UPLOAD_DIR"

          # Create unique random suffix (5 letters)
          RNDSTR=$(tr -dc 'a-z' < /dev/urandom | head -c5)

          shopt -s nullglob
          file_found=false
          for f in "$DOWNLOAD_DIR"/*; do
            if [ -f "$f" ]; then
              file_found=true
              base=$(basename "$f")
              echo "→ Archiving $base"
              zip -j -s 99m "$UPLOAD_DIR/${base}_${RNDSTR}.zip" "$f"
            fi
          done

          if [ "$file_found" = false ]; then
            echo "Error: No regular files in $DOWNLOAD_DIR"
            exit 1
          fi

      - name: Cleanup temporary download directory
        run: rm -rf "${{ steps.download.outputs.download_dir }}"

      - name: Commit and push changes
        env:
          BRANCH: ${{ github.ref_name }}
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # ------------- CONFIGURE GIT -------------
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config http.postBuffer 524288000
      
          # ------------- STAGE ALL CHANGES ---------
          # (Adjust the path as needed for each workflow – e.g., '.' or specific folders)
          git add .
      
          # ------------- NOTHING TO COMMIT? --------
          if git diff --staged --quiet; then
            echo "✅ No changes to commit."
            exit 0
          fi
      
          git commit -m "chore: update generated files [skip ci]"
      
          # ------------- AUTHENTICATED REMOTE ------
          REPO="${{ github.repository }}"
          git remote set-url origin "https://x-access-token:${TOKEN}@github.com/${REPO}.git"
      
          # ------------- PUSH WITH RETRIES ---------
          RETRIES=5
          for i in $(seq 1 $RETRIES); do
            echo "🚀 Push attempt $i of $RETRIES..."
            git pull --rebase --autostash origin "$BRANCH" || true
            if git push origin "$BRANCH"; then
              echo "✅ Push succeeded."
              break
            else
              echo "❌ Push failed."
              if [ $i -lt $RETRIES ]; then
                sleep 3
              else
                echo "::error::All push attempts failed. If this is a forked repository, the GITHUB_TOKEN does not have write permission. Use a Personal Access Token (PAT)."
                exit 1
              fi
            fi
          done
      
          # ------------- VERIFICATION ---------------
          echo "🔍 Verifying remote branch state..."
          git fetch origin "$BRANCH"
          if git diff --quiet "origin/$BRANCH" HEAD; then
            echo "✅ Remote branch matches local – push confirmed."
          else
            echo "❌ Remote branch differs from local. The push might have been rejected (common in forks)."
            echo "::error::Verification failed. Repository is a fork? GITHUB_TOKEN cannot write. Add a PAT secret."
            exit 1
          fi
